<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HIYRO MANGA</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
:root{
  --accent:#22c55e; --accent-dark:#15803d; --accent-soft:rgba(34,197,94,.15);
  --bg:#0b0c0d; --bg2:#141517; --card:#1a1b1e; --card2:#202226;
  --text:#f3f4f6; --muted:#9aa0a6; --border:#2a2c30; --danger:#ef4444; --gold:#eab308;
  --radius:16px; --radius-sm:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent;}
a{color:inherit;text-decoration:none;} button{font-family:inherit;cursor:pointer;border:none;}
input,select,textarea{font-family:inherit;} img{display:block;max-width:100%;}
::-webkit-scrollbar{width:0;height:0;}
#shell{max-width:480px;margin:0 auto;min-height:100vh;position:relative;background:var(--bg);overflow-x:hidden;}
#app{padding-bottom:84px;min-height:100vh;}
.statusbar{height:env(safe-area-inset-top,12px);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;}
.topbar h1{font-size:19px;font-weight:800;margin:0;}
.icon-btn{width:38px;height:38px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--text);font-size:18px;position:relative;flex-shrink:0;}
.icon-btn .dot{position:absolute;top:6px;left:6px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);}
.row{display:flex;align-items:center;gap:10px;}
.between{justify-content:space-between;}
.back-row{display:flex;align-items:center;gap:12px;padding:14px 16px 6px;}
.back-row h2{font-size:17px;font-weight:800;margin:0;flex:1;text-align:center;margin-right:38px;}
.points-pill{display:flex;align-items:center;gap:5px;background:linear-gradient(90deg,var(--gold),#fbbf24);color:#3a2a00;font-weight:800;font-size:12.5px;padding:7px 12px;border-radius:20px;}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:var(--radius-sm);background:var(--accent);color:#06140a;font-weight:800;font-size:15px;transition:.15s;}
.btn:active{transform:scale(.97);}
.btn.outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn.ghost{background:var(--card);color:var(--text);}
.btn.danger{background:var(--danger);color:#fff;}
.btn.gold{background:linear-gradient(90deg,var(--gold),#fbbf24);color:#3a2a00;}
.btn.sm{padding:10px;font-size:13px;width:auto;}
.btn[disabled]{opacity:.5;}
.btn-icon-circle{width:42px;height:42px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px;}
.input-wrap{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 12px;}
.input-wrap i{color:var(--muted);font-size:17px;}
.input-wrap input,.input-wrap select{flex:1;background:transparent;border:none;color:var(--text);padding:13px 8px;font-size:14px;outline:none;}
textarea.ta{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:12px;font-size:14px;outline:none;resize:vertical;min-height:90px;}
.section{padding:6px 16px 4px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.section-head h3{font-size:15.5px;font-weight:800;margin:0;}
.section-head a{font-size:12px;color:var(--accent);font-weight:700;}
.hscroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scroll-snap-type:x proximity;}
.poster{flex:0 0 110px;scroll-snap-align:start;position:relative;}
.poster img{width:110px;height:150px;border-radius:12px;object-fit:cover;background:var(--card);}
.poster .rank{position:absolute;top:-6px;right:-6px;width:24px;height:24px;border-radius:50%;background:var(--accent);color:#06140a;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;}
.poster .pname{font-size:12px;margin-top:6px;font-weight:600;line-height:1.3;}
.list-card{display:flex;gap:12px;background:var(--card);border-radius:var(--radius);padding:10px;margin-bottom:10px;}
.list-card img{width:64px;height:84px;border-radius:10px;object-fit:cover;flex-shrink:0;}
.list-card .info{flex:1;min-width:0;}
.list-card .title{font-weight:800;font-size:14px;margin:0 0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-card .meta{font-size:11.5px;color:var(--muted);margin-bottom:6px;}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-soft);color:var(--accent);font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:20px;}
.chip.gray{background:var(--card2);color:var(--muted);}
.chip.gold{background:rgba(234,179,8,.15);color:var(--gold);}
.chip.lock{background:rgba(239,68,68,.12);color:var(--danger);}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:8px;color:#06140a;vertical-align:middle;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.hero{position:relative;height:330px;border-radius:0 0 24px 24px;overflow:hidden;}
.hero img{width:100%;height:100%;object-fit:cover;}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top, var(--bg) 2%, transparent 55%);}
.hero-content{position:absolute;bottom:16px;right:16px;left:16px;z-index:2;}
.hero-content h2{font-size:21px;font-weight:900;margin:0 0 4px;}
.hero-content p{font-size:12px;color:#d8d8d8;margin:0 0 12px;}
.hero-top{position:absolute;top:0;left:0;right:0;z-index:3;padding:14px 16px;display:flex;justify-content:space-between;}
.bottomnav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:8px 4px calc(8px + env(safe-area-inset-bottom,0));z-index:50;}
.bottomnav .nitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10.5px;padding:6px 0;font-weight:700;}
.bottomnav .nitem i{font-size:21px;}
.bottomnav .nitem.active{color:var(--accent);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.sheet{max-width:480px;width:100%;background:var(--bg2);border-radius:22px 22px 0 0;padding:20px;max-height:88vh;overflow-y:auto;animation:up .2s ease;}
@keyframes up{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 16px;}
.sheet h3{font-size:17px;font-weight:800;margin:0 0 14px;text-align:center;}
.center-modal{display:flex;align-items:center;justify-content:center;}
.box-modal{width:88%;background:var(--bg2);border-radius:20px;padding:22px;text-align:center;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1f2023;color:#fff;padding:11px 20px;border-radius:30px;font-size:13px;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:80%;text-align:center;}
.muted{color:var(--muted);}
.center{text-align:center;}
.empty-state{text-align:center;padding:60px 20px;}
.empty-state i{font-size:60px;color:var(--accent);margin-bottom:14px;}
.empty-state h3{font-size:17px;margin:0 0 6px;}
.empty-state p{color:var(--muted);font-size:13px;}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp 0.7s linear infinite;margin:40px auto;}
@keyframes sp{to{transform:rotate(360deg)}}
.divider{height:1px;background:var(--border);margin:14px 0;}
.avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;background:var(--card2);flex-shrink:0;}
.stars{color:#fbbf24;font-size:13px;}
.tab-pills{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;}
.pill{padding:8px 16px;border-radius:20px;background:var(--card);color:var(--muted);font-size:12.5px;font-weight:700;white-space:nowrap;border:1px solid var(--border);}
.pill.active{background:var(--accent);color:#06140a;border-color:var(--accent);}
.fab{position:fixed;bottom:96px;left:24px;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#06140a;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 6px 18px rgba(0,0,0,.4);z-index:40;}
.calendar-strip{display:flex;gap:8px;overflow-x:auto;padding:10px 0;}
.cal-day{flex:0 0 50px;background:var(--card);border-radius:14px;padding:10px 0;text-align:center;}
.cal-day.active{background:var(--accent);color:#06140a;}
.cal-day .d{font-size:11px;color:var(--muted);}
.cal-day.active .d{color:#06140a;}
.cal-day .n{font-size:16px;font-weight:800;}
.timeline-item{display:flex;gap:12px;margin-bottom:16px;}
.timeline-item .time{font-size:12px;color:var(--muted);width:46px;flex-shrink:0;padding-top:6px;}
.swatch{width:42px;height:42px;border-radius:50%;border:3px solid transparent;display:inline-flex;}
.swatch.active{border-color:var(--text);}
.progress-bar{height:6px;background:var(--card2);border-radius:6px;overflow:hidden;}
.progress-bar .fill{height:100%;background:var(--accent);}
.ad-slot{margin:10px 16px;min-height:0;}
.ad-slot:empty{display:none;}
.reply-box{display:flex;gap:8px;align-items:center;background:var(--bg2);padding:10px 12px;border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;padding-bottom:calc(10px + env(safe-area-inset-bottom,0));}
.reply-box input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:30px;padding:11px 16px;color:var(--text);outline:none;}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#06140a;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.locked-banner{background:var(--card);border:1px dashed var(--accent);border-radius:var(--radius);padding:20px;text-align:center;margin:16px;}
.reader-page{width:100%;max-width:100%;display:block;background:#050505;image-rendering:-webkit-optimize-contrast;image-rendering:crisp-edges;}
.reader-toolbar{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:rgba(20,21,23,.92);backdrop-filter:blur(6px);padding:10px 16px calc(10px + env(safe-area-inset-bottom,0));display:flex;justify-content:space-between;align-items:center;z-index:60;}
.reader-top{position:fixed;top:0;left:0;right:0;max-width:480px;margin:0 auto;background:rgba(20,21,23,.92);backdrop-filter:blur(6px);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;z-index:60;}
.page-nav-btn{width:46px;height:46px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:20px;}
.avatar-store-item{position:relative;text-align:center;}
.avatar-store-item img{width:100%;aspect-ratio:1;border-radius:14px;object-fit:cover;background:var(--card);}
.avatar-store-item.locked img{opacity:.35;filter:grayscale(1);}
.avatar-store-item .price{font-size:10.5px;margin-top:6px;color:var(--gold);font-weight:800;}
.tx-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
.tx-row:last-child{border-bottom:none;}
/* forum */
.forum-card{background:var(--card);border-radius:16px;margin-bottom:12px;overflow:hidden;border:1px solid var(--border);transition:.15s;}
.forum-card:active{transform:scale(.98);}
.forum-card.pinned{border-color:var(--accent);box-shadow:0 0 12px var(--accent-soft);}
.forum-thumb{width:100%;height:160px;object-fit:cover;}
.donation-row{display:flex;align-items:center;gap:10px;background:rgba(234,179,8,.06);border:1px solid rgba(234,179,8,.18);border-radius:14px;padding:12px 14px;margin-bottom:12px;}
/* polls */
.poll-card{background:var(--card);border-radius:18px;overflow:hidden;margin-bottom:14px;border:1px solid var(--border);}
.poll-image{width:100%;height:180px;object-fit:cover;}
/* points store */
.points-hero{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--gold),#fbbf24);border-radius:20px;padding:26px 20px;text-align:center;margin-bottom:18px;}
.points-hero-icon{position:absolute;font-size:130px;opacity:.15;top:-24px;left:-14px;color:#3a2a00;}
.points-action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.points-action-btn{background:var(--card);border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;border:1px solid var(--border);transition:.15s;}
.points-action-btn:active{transform:scale(.96);}
.points-action-btn i{font-size:22px;color:var(--accent);display:block;margin-bottom:6px;}
.points-action-btn b{display:block;font-size:12px;margin-bottom:2px;}
.points-action-btn span{font-size:10px;color:var(--muted);}
/* subscriptions */
.tier-card{margin-bottom:16px;}
.pkg-card.selected,.pkg-card2.selected{border-color:var(--accent)!important;background:var(--accent-soft)!important;}
.pay-method-info{background:var(--card);border-radius:14px;padding:14px;margin-bottom:14px;border:1px solid var(--border);}
</style>
</head>
<body>
<div id="shell"><div id="app"></div><div id="modal-root"></div><div id="toast-root"></div></div>
<script>
/* =========================================================
   MANGAX v2 - USER APP
   ========================================================= */
const SUPABASE_URL = 'https://dgexhvqiirkmodskijoc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnZXhodnFpaXJrbW9kc2tpam9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MjEyMzAsImV4cCI6MjA5OTA5NzIzMH0._-U0Gxt5ehYWQ0_WbwmrTfCZtsy5Qp5SMD0PrngldE8';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const APP_NAME = 'HIYRO MANGA';

const THEMES = {green:{a:'#22c55e',d:'#15803d'},blue:{a:'#3b82f6',d:'#1d4ed8'},purple:{a:'#a855f7',d:'#7e22ce'},red:{a:'#ef4444',d:'#b91c1c'},orange:{a:'#f97316',d:'#c2410c'},pink:{a:'#ec4899',d:'#be185d'},teal:{a:'#14b8a6',d:'#0f766e'},gold:{a:'#eab308',d:'#a16207'}};
const GENRES = ['أكشن','دراما','كوميدي','مغامرة','رومانسي','خيال علمي','رعب','غموض','إيسيكاي','شريحة من الحياة','سحر','رياضة','بطل خارق'];
const TYPE_LABEL = {manga:'مانجا',manhwa:'مانهوا',manhua:'مانهوا صينية'};
const TIER_NAMES = {1:'باقة المحارب',2:'باقة الأساطير',3:'باقة الأسلاف'};
const TIER_ICONS = {1:'ri-sword-line',2:'ri-vip-crown-2-fill',3:'ri-crown-2-fill'};
const PROFILE_BADGE_FIELDS = 'username,avatar_url,custom_badge_color,subscription_status,subscription_end,subscription_plans(badge_text,badge_color,tier)';

const state = { session:null, user:null, profile:null, route:'#/splash', params:{}, listFilters:{sort:'popularity', type:'all', genre:'all'}, readerPages:[], readerIdx:0, readerMode:'scroll', readerDir:'rtl' };

function setTheme(name){
  const t = THEMES[name] || THEMES.green;
  document.documentElement.style.setProperty('--accent', t.a);
  document.documentElement.style.setProperty('--accent-dark', t.d);
  document.documentElement.style.setProperty('--accent-soft', t.a+'26');
  localStorage.setItem('mangax_theme', name);
}
setTheme(localStorage.getItem('mangax_theme') || 'green');

function toast(msg){ const root=document.getElementById('toast-root'); const el=document.createElement('div'); el.className='toast'; el.textContent=msg; root.appendChild(el); setTimeout(()=>el.remove(),2400); }
function go(route, params={}){ state.params = params; location.hash = route; }
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function timeAgo(dateStr){
  const d = new Date(dateStr); const diff = (Date.now()-d.getTime())/1000;
  if(diff<60) return 'الآن'; if(diff<3600) return Math.floor(diff/60)+' د'; if(diff<86400) return Math.floor(diff/3600)+' س';
  if(diff<2592000) return Math.floor(diff/86400)+' يوم'; return d.toLocaleDateString('ar');
}
function starsHtml(score){ score=score||0; const full=Math.round(score/2); let h=''; for(let i=0;i<5;i++) h+=`<i class="ri-star-${i<full?'fill':'line'}"></i>`; return `<span class="stars">${h}</span>`; }
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }
function openSheet(html){ document.getElementById('modal-root').innerHTML = `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="sheet">${html}</div></div>`; }
function openCenter(html){ document.getElementById('modal-root').innerHTML = `<div class="overlay center-modal" onclick="if(event.target===this)closeModal()"><div class="box-modal">${html}</div></div>`; }

function badgeHtml(p){
  if(!p) return '';
  const active = p.subscription_status==='active' && p.subscription_end && new Date(p.subscription_end) > new Date();
  if(!active || !p.subscription_plans) return '';
  const color = p.custom_badge_color || p.subscription_plans.badge_color || '#22c55e';
  const text = p.subscription_plans.badge_text || 'مميز';
  return `<span class="badge" style="background:${color}">${escapeHtml(text)}</span>`;
}
function isAdminUser(){ return state.profile?.role==='admin'; }
function myTier(){
  if(!state.profile) return 0;
  if(state.profile.subscription_status==='active' && state.profile.subscription_end && new Date(state.profile.subscription_end)>new Date()){
    return state.profile.subscription_plans?.tier || 0;
  }
  return 0;
}
function effectiveTier(){ return isAdminUser() ? 3 : myTier(); }

async function renderAdSlot(elId, placement){
  const el = document.getElementById(elId); if(!el) return;
  try{ if(effectiveTier()>=1) return; }catch(e){} // إزالة إعلانات Adsterra لمشتركي المحارب فأعلى
  const {data} = await sb.from('ads_codes').select('*').eq('placement',placement).eq('is_active',true).limit(1);
  if(data && data[0]){ el.innerHTML = data[0].code; el.querySelectorAll('script').forEach(old=>{ const s=document.createElement('script'); [...old.attributes].forEach(a=>s.setAttribute(a.name,a.value)); s.textContent=old.textContent; old.replaceWith(s); }); }
}

/* ---------------- AUTH ---------------- */
async function refreshSession(){
  const {data:{session}} = await sb.auth.getSession();
  state.session = session; state.user = session?.user || null;
  if(state.user){
    const {data} = await sb.from('profiles').select('*, subscription_plans(*)').eq('id', state.user.id).single();
    state.profile = data;
  } else state.profile = null;
}
function isLoggedIn(){ return !!state.user; }
function isSubscriber(){ return state.profile && (state.profile.role==='admin' || (state.profile.subscription_status==='active' && state.profile.subscription_end && new Date(state.profile.subscription_end) > new Date())); }
function myPoints(){ return state.profile?.points || 0; }
function requireAuth(){ if(!isLoggedIn()){ toast('سجّل الدخول أولاً'); go('#/login'); return false;} return true; }

sb.auth.onAuthStateChange((event, session)=>{
  state.session = session; state.user = session?.user || null;
  if(event === 'PASSWORD_RECOVERY'){ go('#/reset-password'); }
});

async function claimMonthlyBonusIfEligible(){
  if(!state.user) return;
  try{
    const {data} = await sb.rpc('claim_monthly_bonus');
    if(data?.awarded){ toast(data.msg); await refreshSession(); }
  }catch(e){ /* silent */ }
}

/* ---------------- LAYOUT HELPERS ---------------- */
function bottomNav(active){
  const items = [
    {r:'#/home', i:'ri-home-5-fill', l:'الرئيسية'},
    {r:'#/release-calendar', i:'ri-calendar-2-fill', l:'الإصدارات'},
    {r:'#/my-list', i:'ri-bookmark-fill', l:'قائمتي'},
    {r:'#/forum', i:'ri-discuss-fill', l:'المنتدى'},
    {r:'#/profile', i:'ri-user-3-fill', l:'حسابي'},
  ];
  return `<div class="bottomnav">${items.map(it=>`<a class="nitem ${active===it.r?'active':''}" href="${it.r}"><i class="${it.i}"></i><span>${it.l}</span></a>`).join('')}</div>`;
}
function topbarSimple(title, opts={}){
  return `<div class="statusbar"></div>
  <div class="topbar">
    <h1>${title}</h1>
    <div class="row" style="gap:8px">
      ${isLoggedIn()?`<a class="points-pill" href="#/points-store"><i class="ri-coin-fill"></i> ${myPoints()}</a>`:''}

/* ================= ROUTER ================= */
const routes = {};
function route(path, fn){ routes[path]=fn; }
async function renderRoute(){
  const hash = location.hash || '#/splash';
  const [path] = hash.split('?');
  const segs = path.split('/').filter(Boolean);
  let matched = routes[path]; let params = Object.assign({}, state.params); let routeKey = path;
  if(!matched){
    for(const key in routes){
      const ks = key.split('/').filter(Boolean);
      if(ks.length!==segs.length) continue;
      let ok=true; const p={};
      for(let i=0;i<ks.length;i++){ if(ks[i].startsWith(':')) p[ks[i].slice(1)]=segs[i]; else if(ks[i]!==segs[i]){ok=false;break;} }
      if(ok){ matched=routes[key]; Object.assign(params,p); routeKey=key; break; }
    }
  }
  state.route = routeKey;
  window.scrollTo(0,0);
  if(!matched){ document.getElementById('app').innerHTML = `<div class="empty-state"><i class="ri-error-warning-line"></i><h3>404</h3></div>`; return; }
  try{ await matched(params); }catch(e){ console.error(e); toast('حدث خطأ، حاول مجدداً'); }
}
window.addEventListener('hashchange', renderRoute);

  const days = ['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
  let html='';
  for(let i=-3;i<=10;i++){ const d=new Date(today); d.setDate(d.getDate()+i); html += `<div class="cal-day ${i===0?'active':''}" data-i="${i}" onclick="selectCalDay(${i})"><div class="d">${days[d.getDay()]}</div><div class="n">${d.getDate()}</div></div>`; }
  strip.innerHTML = html;
  await selectCalDay(0);
});
async function selectCalDay(offset){
  document.querySelectorAll('.cal-day').forEach(d=>d.classList.toggle('active', d.dataset.i==offset));
  const d = new Date(); d.setDate(d.getDate()+offset);
  const start = new Date(d.getFullYear(),d.getMonth(),d.getDate()).toISOString();
  const end = new Date(d.getFullYear(),d.getMonth(),d.getDate()+1).toISOString();
  const {data} = await sb.from('chapters').select('*, series(*)').gte('release_date',start).lt('release_date',end).order('release_date');
  const box = document.getElementById('cal-content');
  box.innerHTML = (data&&data.length) ? data.map(c=>`
    <div class="timeline-item">
      <div class="time">${new Date(c.release_date).toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'})}</div>
      <div class="list-card" style="flex:1;margin-bottom:0" onclick="go('#/series/${c.series?.id}')">

        <div class="info"><p class="title">${escapeHtml(c.series?.title||'')}</p><p class="meta">الفصل ${c.chapter_number}</p>

      </div></div>`).join('') : `<div class="empty-state"><i class="ri-emotion-sad-line"></i><h3>لا يوجد جدول إصدار</h3><p>عذراً، لا توجد فصول صادرة في هذا التاريخ</p></div>`;
}

/* ---------------- CHAPTER ACCESS + DIRECT LINK GATE + READER ---------------- */
async function openChapter(chapterId){
  if(!chapterId) return toast('لا توجد فصول متاحة');
  const {data:chapter} = await sb.from('chapters').select('*, series(*)').eq('id',chapterId).single();
  if(!chapter) return toast('الفصل غير متاح');
  let unlocked = chapter.access_type==='free';
  if(!unlocked && isAdminUser()) unlocked = true;
  if(!unlocked && chapter.access_type==='subscribers' && isSubscriber()) unlocked = true;
  if(!unlocked && chapter.access_type==='points'){
    if(!state.user){ openLockSheet(chapter); return; }
    const {data, error} = await sb.from('chapter_purchases').select('chapter_id').eq('user_id',state.user.id).eq('chapter_id',chapterId).maybeSingle();
    if(data && !error) unlocked = true;
  }
  if(!unlocked){ openLockSheet(chapter); return; }
  if(chapter.direct_link_id && !sessionStorage.getItem('dlink_passed_'+chapterId)){
    go('#/chapter-gate/'+chapterId); return;
  }
  go('#/reader/'+chapterId);
}
function openLockSheet(chapter){
  if(chapter.access_type==='subscribers'){
    openSheet(`<div class="sheet-handle"></div>
    <div class="center" style="padding:10px 0"><i class="ri-vip-crown-2-fill" style="font-size:42px;color:var(--gold)"></i>
    <h3 style="margin:14px 0 6px">هذا الفصل للمشتركين فقط</h3>
    <p class="muted" style="font-size:12.5px;margin-bottom:18px">اشترك في إحدى الباقات لفتح كل الفصول الحصرية</p>
    <a class="btn" href="#/subscriptions" onclick="closeModal()">عرض الباقات</a></div>`);
  } else {
    if(!requireAuth()) return;
    openSheet(`<div class="sheet-handle"></div>
    <div class="center" style="padding:10px 0"><i class="ri-coin-fill" style="font-size:42px;color:var(--gold)"></i>
    <h3 style="margin:14px 0 6px">فصل مقفل بالنقاط</h3>
    <p class="muted" style="font-size:12.5px;margin-bottom:10px">سعر الفتح: <b style="color:var(--gold)">${chapter.points_price} نقطة</b> | رصيدك: <b>${myPoints()}</b></p>
    <button class="btn gold" style="margin-bottom:10px" onclick="buyChapterNow('${chapter.id}')"><i class="ri-lock-unlock-line"></i> فتح الفصل الآن</button>
    <a class="btn outline" href="#/points-store" onclick="closeModal()">شحن المزيد من النقاط</a></div>`);
  }
}
async function buyChapterNow(chapterId){
  const {data, error} = await sb.rpc('buy_chapter', {p_chapter_id: chapterId});
  if(error || !data?.ok){ toast(data?.msg || 'تعذرت العملية'); return; }
  toast(data.msg); await refreshSession(); closeModal(); openChapter(chapterId);
}
function openDonateSheet(chapterId){
  if(!requireAuth()) return;
  openSheet(`<div class="sheet-handle"></div><h3>دعم هذا الفصل</h3>
  <p class="muted center" style="font-size:12.5px;margin-bottom:14px">رصيدك الحالي: ${myPoints()} نقطة</p>
  <div class="input-wrap" style="margin-bottom:14px"><i class="ri-coin-line"></i><input id="donate-amt" type="number" placeholder="عدد النقاط" min="1"></div>
  <div class="row" style="gap:10px"><button class="btn outline" onclick="closeModal()">إلغاء</button>
  <button class="btn gold" onclick="submitDonate('${chapterId}')">تبرّع</button></div>`);

async function submitDonate(chapterId){
  const amt = parseInt(document.getElementById('donate-amt').value);
  if(!amt || amt<=0) return toast('أدخل عدداً صحيحاً');
  const {data, error} = await sb.rpc('donate_chapter', {p_chapter_id: chapterId, p_amount: amt});

  toast(data.msg); await refreshSession(); closeModal();

function renderPagedView(chapter){
  const app = document.getElementById('app');
  const pg = state.readerPages[state.readerIdx];
  const dir = state.readerDir;
  app.innerHTML = `
  <div class="reader-top"><button class="icon-btn" onclick="closeReader()"><i class="ri-close-line"></i></button>
    <span style="font-size:12.5px">${state.readerIdx+1} / ${state.readerPages.length}</span>
    <button class="icon-btn" onclick="openReaderSettings('${chapter.id}')"><i class="ri-settings-3-line"></i></button></div>
  ${state.readerIdx===0?`<div id="ad-before-reader" class="ad-slot" style="margin:60px 16px 0"></div>`:''}
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:56px 0 80px">
    <img src="${pg.image_url}" style="width:100%;max-width:100vw;height:auto;display:block;object-fit:contain">
  </div>
  <div class="reader-toolbar">
    <button class="page-nav-btn" onclick="pageNav('${dir==='rtl'?'next':'prev'}','${chapter.id}')"><i class="ri-arrow-${dir==='rtl'?'left':'right'}-s-line"></i></button>
    <button class="btn gold sm" onclick="openDonateSheet('${chapter.id}')"><i class="ri-heart-fill"></i></button>
    <button class="page-nav-btn" onclick="pageNav('${dir==='rtl'?'prev':'next'}','${chapter.id}')"><i class="ri-arrow-${dir==='rtl'?'right':'left'}-s-line"></i></button>
  </div>`;
  if(state.readerIdx===0) renderAdSlot('ad-before-reader','before_reader');
  // Swipe support
  let _tsx=0, _tsy=0;
  const _ra = document.getElementById('app');
  _ra.addEventListener('touchstart', e=>{ _tsx=e.touches[0].clientX; _tsy=e.touches[0].clientY; }, {passive:true});
  _ra.addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - _tsx;
    const dy = Math.abs(e.changedTouches[0].clientY - _tsy);
    if(Math.abs(dx)>50 && dy<80){
      const dir = state.readerDir==='rtl' ? (dx<0?'next':'prev') : (dx>0?'next':'prev');
      pageNav(dir, chapter.id);
    }
  }, {passive:true});
}
function pageNav(dir, chapterId){
  if(dir==='next'){
    if(state.readerIdx < state.readerPages.length-1){ state.readerIdx++; }
    else { showPagedEndScreen(chapterId); return; }
  } else if(dir==='prev'){
    if(state.readerIdx > 0) state.readerIdx--;
    else return;
  }
  if(state.readerChapter){ renderPagedView(state.readerChapter); }
  else { sb.from('chapters').select('*, series(*)').eq('id',chapterId).single().then(({data})=>{ state.readerChapter=data; renderPagedView(data); }); }
}

function idbOpen(){ return new Promise((res,rej)=>{ const req = indexedDB.open('mangax_offline',1); req.onupgradeneeded = ()=>{ req.result.createObjectStore('chapters',{keyPath:'id'}); }; req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); }
async function saveChapterOffline(chapterId){
  openCenter(`<div style="text-align:center;padding:10px 0">
  <i class="ri-download-2-line" style="font-size:44px;color:var(--accent);margin-bottom:10px;display:block"></i>
  <h3 style="margin:0 0 14px">جاري تحميل الفصل...</h3>
  <div class="progress-bar" style="margin-bottom:8px"><div class="fill" id="dl-fill" style="width:0%"></div></div>
  <p class="muted" id="dl-pct" style="font-size:12px;margin:0">جاري التجهيز...</p>
  <p class="muted" id="dl-status" style="font-size:11px;margin-top:4px"></p></div>`);
  try{
    const {data:chapter} = await sb.from('chapters').select('*, series(*)').eq('id',chapterId).single();
    const pages = state.readerPages;
    if(!pages||!pages.length){ closeModal(); toast('لا توجد صفحات'); return; }
    const zip = new JSZip();
    const seriesName = (chapter.series?.title||'series').replace(/[/\\?%*:|"<>]/g,'_');
    const chNum = String(chapter.chapter_number).padStart(3,'0');
    const folder = zip.folder('HIYRO MANGA').folder(seriesName).folder('الفصل_'+chNum);
    for(let i=0;i<pages.length;i++){
      const pct = Math.round(i/pages.length*100);
      const fillEl = document.getElementById('dl-fill');
      const pctEl = document.getElementById('dl-pct');
      const statEl = document.getElementById('dl-status');
      if(fillEl) fillEl.style.width = pct+'%';
      if(pctEl) pctEl.textContent = pct+'%';
      if(statEl) statEl.textContent = 'صفحة '+(i+1)+' من '+pages.length;
      const res = await fetch(pages[i].image_url);
      const blob = await res.blob();
      const ext = blob.type.includes('png')?'png':'jpg';
      folder.file('page_'+String(i+1).padStart(3,'0')+'.'+ext, blob);
    }
    if(document.getElementById('dl-fill')) document.getElementById('dl-fill').style.width='100%';
    if(document.getElementById('dl-pct')) document.getElementById('dl-pct').textContent='جاري ضغط الملفات...';
    const zipBlob = await zip.generateAsync({type:'blob', compression:'STORE'});
    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'HIYRO_MANGA_'+seriesName+'_ف'+chNum+'.zip';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 3000);
    closeModal();
    toast('✓ تم تحميل الفصل - ابحث في ملفات التنزيلات');
  }catch(e){ console.error(e); closeModal(); toast('تعذر تحميل الفصل: '+e.message); }
}

route('#/subscriptions', async ()=>{

  let html = '';
  if(subscribed) html += `<div class="locked-banner" style="border-color:var(--accent);background:linear-gradient(135deg,rgba(34,197,94,.08),rgba(234,179,8,.05))"><i class="ri-vip-crown-fill" style="font-size:32px;color:var(--gold)"></i><h3 style="color:var(--gold)">أنت مشترك بالفعل ✓</h3><p class="muted" style="font-size:12.5px">ينتهي اشتراكك في <b>${state.profile.subscription_end?new Date(state.profile.subscription_end).toLocaleDateString('ar'):''}</b></p><p class="muted" style="font-size:11.5px">ستُسحب جميع الميزات تلقائياً عند انتهاء الاشتراك حتى تجدّد.</p></div>`;
  if(pending) html += `<div class="locked-banner"><i class="ri-time-line" style="font-size:30px;color:var(--accent)"></i><h3>طلبك قيد المراجعة</h3></div>`;
  for(const tier of [1,2,3]){
    const g = groups[tier]; if(!g.length) continue;
    const monthly = g.find(pl=>pl.billing_period==='monthly'); const yearly = g.find(pl=>pl.billing_period==='yearly');
    window.__tierPlans[tier] = {monthly, yearly};
    const isThisActive = subscribed && (state.profile?.subscription_plan_id===monthly?.id || state.profile?.subscription_plan_id===yearly?.id);
    const tierGradients={1:'linear-gradient(135deg,#1a2a1a,#0d1a10)',2:'linear-gradient(135deg,#1a1a2a,#0d0d1a)',3:'linear-gradient(135deg,#2a1a0a,#1a0d00)'};
    const tierColors={1:'var(--accent)',2:'#a855f7',3:'var(--gold)'};
    const tierIcons2={1:'⚔️',2:'👑',3:'🏆'};
    html += `<div class="card tier-card" style="border:1px solid ${tierColors[tier]}33;background:${tierGradients[tier]||'var(--card)'}">
      <div class="row between" style="margin-bottom:14px">
        <div class="row" style="gap:10px">
          <div style="width:46px;height:46px;border-radius:14px;background:${tierColors[tier]}22;display:flex;align-items:center;justify-content:center;font-size:22px">${tierIcons2[tier]}</div>
          <div><h3 style="margin:0;color:${tierColors[tier]}">${TIER_NAMES[tier]}</h3><p style="margin:2px 0;font-size:11px;color:var(--muted)">المستوى ${tier}</p></div>
        </div>
        ${isThisActive?`<span class="chip" style="background:${tierColors[tier]}33;color:${tierColors[tier]}">✓ مفعّلة</span>`:''}
      </div>
      <div class="row" style="gap:8px;margin-bottom:14px">
        <button class="pill toggle-billing active" data-tier="${tier}" data-period="monthly" onclick="switchBilling(${tier},'monthly')" style="flex:1;text-align:center">شهري</button>
        ${yearly?`<button class="pill toggle-billing" data-tier="${tier}" data-period="yearly" onclick="switchBilling(${tier},'yearly')" style="flex:1;text-align:center">سنوي <span style="color:var(--gold);font-size:11px">وفّر 20%</span></button>`:''}
      </div>
      <div id="tier-price-${tier}" style="margin-bottom:14px"><h2 style="margin:0;font-size:28px;font-weight:900;color:${tierColors[tier]}">${monthly?.price||0} <span style="font-size:13px;color:var(--muted)">USD / شهر</span></h2></div>
      <div style="margin-bottom:16px">${(monthly?.features||yearly?.features||[]).map(f=>`<div class="row" style="gap:8px;margin-bottom:8px"><i class="ri-checkbox-circle-fill" style="color:${tierColors[tier]};flex-shrink:0"></i><span style="font-size:13px">${escapeHtml(f)}</span></div>`).join('')}</div>
      <button class="btn" style="background:${pending||subscribed?'var(--card)':'linear-gradient(90deg,'+tierColors[tier]+','+tierColors[tier]+'aa)'};color:${pending||subscribed?'var(--muted)':'#fff'}" ${pending||subscribed?'disabled':''} onclick="requestSubscription(document.getElementById('tier-selected-plan-${tier}').value)">${subscribed?'✓ مشترك بالفعل':pending?'⏳ قيد المراجعة':'اشترك الآن'}</button>
      <input type="hidden" id="tier-selected-plan-${tier}" value="${monthly?.id||''}">
    </div>`;
  }
  document.getElementById('plans-wrap').innerHTML = html || '<p class="muted center">لا توجد باقات متاحة حالياً</p>';
});
function switchBilling(tier, period){
  document.querySelectorAll(`.toggle-billing[data-tier="${tier}"]`).forEach(b=>b.classList.toggle('active', b.dataset.period===period));
  const plan = window.__tierPlans?.[tier]?.[period];

  document.getElementById(`tier-price-${tier}`).innerHTML = `<h2 style="margin:0;font-size:28px;font-weight:900;color:${tc[tier]||'var(--accent)'}">${plan.price} <span style="font-size:13px;color:var(--muted)">USD / ${period==='monthly'?'شهر':'سنة'}</span></h2>`;
  document.getElementById(`tier-selected-plan-${tier}`).value = plan.id;
}
async function requestSubscription(planId){
  if(!planId) return toast('اختر باقة أولاً');
  await sb.from('subscription_requests').insert({user_id:state.user.id, plan_id:planId, status:'pending'});
  await sb.from('profiles').update({subscription_status:'pending'}).eq('id',state.user.id);
  toast('تم إرسال طلب الاشتراك، سيتم مراجعته من قبل الإدارة'); renderRoute();
}

route('#/polls', async ()=>{
  document.getElementById('app').innerHTML = `${backHeader('التصويتات')}<div id="polls-wrap" style="padding:10px 16px"><div class="spinner"></div></div>`;
  const {data:polls} = await sb.from('polls').select('*').eq('is_active',true).order('created_at',{ascending:false});
  let myVotes = {};
  if(state.user && polls?.length){
    const {data:votes} = await sb.from('poll_votes').select('*').eq('user_id',state.user.id).in('poll_id',polls.map(p=>p.id));
    votes?.forEach(v=>myVotes[v.poll_id]=v.option_index);
  }
  document.getElementById('polls-wrap').innerHTML = (polls&&polls.length) ? await Promise.all(polls.map(async pl=>{
    const {data:allVotes} = await sb.from('poll_votes').select('option_index').eq('poll_id',pl.id);
    const total = allVotes?.length||0;
    const counts = (pl.options||[]).map((_,i)=>allVotes?.filter(v=>v.option_index===i).length||0);
    const voted = myVotes[pl.id]!==undefined;
    const timeLeft = pl.ends_at ? pollTimeLeft(pl.ends_at) : null;
    return `<div class="poll-card" style="border:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.3)">
      ${pl.image_url?`<div style="position:relative"><img src="${pl.image_url}" class="poll-image" style="height:180px"><div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 40%,transparent)"></div><div style="position:absolute;bottom:12px;right:14px;left:14px"><h3 style="font-size:15px;margin:0;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8)">${escapeHtml(pl.question)}</h3>${timeLeft?`<span style="font-size:10.5px;color:rgba(255,255,255,.7)"><i class="ri-time-line"></i> ${timeLeft}</span>`:''}</div></div>`:
      `<div style="padding:16px 16px 0"><h3 style="font-size:15px;margin:0 0 4px">${escapeHtml(pl.question)}</h3>${timeLeft?`<p class="muted" style="font-size:11px;margin-bottom:8px"><i class="ri-time-line"></i> ${timeLeft}</p>`:''}</div>`}
      <div style="padding:14px">
      ${(pl.options||[]).map((opt,i)=>{
        const pct = total ? Math.round(counts[i]*100/total) : 0;
        const isWin = voted && counts[i]===Math.max(...counts);
        return voted ? `<div style="margin-bottom:10px"><div class="row between" style="font-size:13px;margin-bottom:5px"><span style="font-weight:${myVotes[pl.id]===i?'800':'400'}">${escapeHtml(opt)} ${myVotes[pl.id]===i?'<i class="ri-checkbox-circle-fill" style="color:var(--accent)"></i>':''}</span><span style="font-weight:700;color:${isWin?'var(--gold)':'var(--muted)'}">${pct}%</span></div><div class="progress-bar" style="height:8px"><div class="fill" style="width:${pct}%;background:${myVotes[pl.id]===i?'var(--accent)':isWin?'var(--gold)':'var(--border)'}"></div></div></div>`
        : `<button class="btn outline" style="margin-bottom:8px;justify-content:flex-start;padding:12px 16px;font-size:13px" onclick="vote('${pl.id}',${i})">${escapeHtml(opt)}</button>`;
      }).join('')}
      <p class="muted" style="font-size:11px;margin-top:4px"><i class="ri-user-3-line"></i> ${total} صوت</p>
      </div></div>`;
  })).then(arr=>arr.join('')) : `<div class="empty-state"><i class="ri-bar-chart-box-line"></i><h3>لا تصويتات حالياً</h3></div>`;
});
function pollTimeLeft(endsAt){
  const diff = new Date(endsAt) - new Date();
  if(diff<=0) return 'انتهى التصويت';
  const days = Math.floor(diff/86400000);
  if(days>0) return `ينتهي خلال ${days} يوم`;
  const hours = Math.floor(diff/3600000);
  return `ينتهي خلال ${hours} ساعة`;
}
async function vote(pollId, idx){
  if(!requireAuth()) return;
  const {error} = await sb.from('poll_votes').insert({poll_id:pollId, user_id:state.user.id, option_index:idx});
  if(error) return toast('لقد صوّت بالفعل');
  toast('تم تسجيل صوتك'); renderRoute();
}

/* ---------------- FORUM (مفتوح للجميع، منشور واحد يومياً نصي، صور لمشتركي المحارب فأعلى) ---------------- */
route('#/forum', async ()=>{
  document.getElementById('app').innerHTML = `${backHeader('المنتدى')}<div id="forum-info" style="padding:0 16px"></div><div id="forum-wrap" style="padding:10px 16px 90px"><div class="spinner"></div></div>
  ${state.user?`<div class="fab" onclick="go('#/forum-new')"><i class="ri-add-line"></i></div>`:''}`;
  const startOfDay = new Date(); startOfDay.setHours(0,0,0,0);
  let usedToday = false;
  if(state.user){
    const {count:todayCount} = await sb.from('forum_posts').select('*',{count:'exact',head:true}).eq('user_id',state.user.id).gte('created_at', startOfDay.toISOString());
    usedToday = (todayCount||0)>=1 && !isAdminUser();
  }
  document.getElementById('forum-info').innerHTML = `<div class="card" style="margin-bottom:12px;padding:12px 14px;background:var(--card);border-radius:14px">
    <div class="row" style="gap:8px"><i class="ri-information-line" style="color:var(--accent)"></i>
    <span style="font-size:11.5px;color:var(--muted)">${!state.user?'سجّل الدخول للمشاركة في المنتدى':usedToday?'استخدمت منشورك المجاني لهذا اليوم، عد غداً للنشر مجدداً':'يمكنك نشر موضوع نصي واحد يومياً. مشتركو باقة المحارب فأعلى يمكنهم إضافة صور'}</span></div></div>`;
  const {data} = await sb.from('forum_posts').select(`*, profiles(${PROFILE_BADGE_FIELDS})`).order('is_pinned',{ascending:false}).order('created_at',{ascending:false});
  document.getElementById('forum-wrap').innerHTML = (data&&data.length) ? data.map(post=>`
    <div class="forum-card ${post.is_pinned?'pinned':''}" onclick="go('#/forum-post/${post.id}')" style="box-shadow:0 2px 10px rgba(0,0,0,.25)">
      ${post.image_url?`<div style="position:relative"><img src="${post.image_url}" class="forum-thumb" style="height:160px"><div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6),transparent)"></div></div>`:''}
      <div style="padding:14px">
        <div class="row" style="gap:8px;margin-bottom:10px">
          <img class="avatar" style="width:32px;height:32px;border:2px solid var(--border)" src="${post.profiles?.avatar_url||''}" onerror="this.style.background='#333'">
          <div style="flex:1;min-width:0">
            <div class="row" style="gap:4px"><span style="font-size:13px;font-weight:800">${escapeHtml(post.profiles?.username||'')}</span>${badgeHtml(post.profiles)}</div>
          </div>
          <span class="muted" style="font-size:10.5px;white-space:nowrap">${timeAgo(post.created_at)}</span>
        </div>
        <h3 style="font-size:14.5px;margin:0 0 6px;font-weight:800">${post.is_pinned?'<i class="ri-pushpin-fill" style="color:var(--accent)"></i> ':''}${escapeHtml(post.title)}</h3>
        <p class="muted" style="font-size:12.5px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${escapeHtml(post.content)}</p>
      </div></div>`).join('') : `<div class="empty-state"><i class="ri-discuss-line"></i><h3>لا مواضيع بعد</h3><p>كن أول من يبدأ نقاشاً</p></div>`;
});
route('#/forum-new', async ()=>{
  if(!requireAuth()) return;
  // No donation/points in forum
  __forumImageUrl = null;
  const canImage = isAdminUser() || myTier()>=1;
  document.getElementById('app').innerHTML = `${backHeader('موضوع جديد')}
  <div style="padding:10px 20px">
    <div class="field"><label>العنوان</label><div class="input-wrap"><i class="ri-text"></i><input id="fp-title"></div></div>
    <div class="field"><label>المحتوى</label><textarea class="ta" id="fp-content"></textarea></div>
    ${canImage ? `<div class="field"><label>صورة (اختياري)</label>
      <input type="file" accept="image/*" id="fp-image-input" onchange="uploadForumImage(this.files[0])" style="color:var(--text)">
      <div id="fp-image-preview" style="margin-top:8px"></div></div>`
      : `<div class="card" style="margin-bottom:14px;padding:12px;background:var(--card);border-radius:12px"><p style="font-size:11.5px;color:var(--muted);margin:0"><i class="ri-lock-line"></i> اشترك في باقة المحارب لإضافة صور لمنشوراتك</p></div>`}
    <button class="btn" onclick="submitForumPost()">نشر</button>
  </div>`;
});
let __forumImageUrl = null;
async function uploadForumImage(file){
  if(!file) return;
  const path=`forum/${state.user.id}_${Date.now()}_${file.name}`;
  const {error} = await sb.storage.from('site-images').upload(path,file,{cacheControl:'3600',upsert:false});
  if(error) return toast('فشل رفع الصورة');
  const {data:{publicUrl}} = sb.storage.from('site-images').getPublicUrl(path);
  __forumImageUrl = publicUrl;
  document.getElementById('fp-image-preview').innerHTML = `<img src="${publicUrl}" style="max-height:120px;border-radius:10px">`;
  toast('تم رفع الصورة');
}
async function submitForumPost(){
  const title = document.getElementById('fp-title').value.trim();
  const content = document.getElementById('fp-content').value.trim();
  if(!title||!content) return toast('أكمل الحقول');
  const payload = {user_id:state.user.id,title,content};
  if(__forumImageUrl) payload.image_url = __forumImageUrl;
  const {error} = await sb.from('forum_posts').insert(payload);
  if(error){
    if(error.message?.includes('DAILY_LIMIT_REACHED')) toast('يمكنك نشر موضوع واحد فقط يومياً');
    else if(error.message?.includes('IMAGE_REQUIRES_WARRIOR')) toast('إضافة الصور تتطلب باقة المحارب');
    else toast('تعذر النشر');
    return;
  }
  __forumImageUrl = null;
  toast('تم نشر الموضوع'); go('#/forum');
}
route('#/forum-post/:id', async (p)=>{
  if(!requireAuth()) return;
  const {data:post} = await sb.from('forum_posts').select(`*, profiles(${PROFILE_BADGE_FIELDS})`).eq('id',p.id).single();
  const {data:replies} = await sb.from('forum_replies').select(`*, profiles(${PROFILE_BADGE_FIELDS})`).eq('post_id',p.id).order('created_at');
  const authorActive = post?.profiles?.subscription_status==='active' && post?.profiles?.subscription_end && new Date(post.profiles.subscription_end)>new Date();
  const authorTier = authorActive ? (post.profiles.subscription_plans?.tier||0) : 0;
  document.getElementById('app').innerHTML = `${backHeader('الموضوع')}
  <div style="padding:10px 16px 90px">
    <div class="card" style="margin-bottom:14px;background:var(--card);border-radius:14px;padding:16px">
      <div class="row" style="gap:8px;margin-bottom:8px"><img class="avatar" style="width:30px;height:30px" src="${post?.profiles?.avatar_url||''}"><span style="font-size:13px;font-weight:700">${escapeHtml(post?.profiles?.username||'')}</span>${badgeHtml(post?.profiles)}</div>
      <h3 style="margin:0 0 6px">${escapeHtml(post?.title||'')}</h3>
      ${post?.image_url?`<img src="${post.image_url}" style="width:100%;border-radius:12px;margin-bottom:10px">`:''}
      <p style="font-size:13.5px;line-height:1.7">${escapeHtml(post?.content||'')}</p>
      <!-- No donation in forum as per settings -->
    </div>
    <p class="muted" style="font-size:12px;margin-bottom:8px">${replies?.length||0} ردّ</p>
    ${(replies||[]).map(r=>`<div class="row" style="align-items:flex-start;gap:10px;margin-bottom:14px">
      <img class="avatar" style="width:32px;height:32px" src="${r.profiles?.avatar_url||''}">
      <div><span style="font-size:12.5px;font-weight:700">${escapeHtml(r.profiles?.username||'')}</span>${badgeHtml(r.profiles)}<p style="font-size:13px;margin:2px 0">${escapeHtml(r.content)}</p></div>
    </div>`).join('')}
  </div>
  <div class="reply-box"><input id="reply-input" placeholder="أضف رداً..."><button class="send-btn" onclick="submitReply('${p.id}')"><i class="ri-send-plane-fill"></i></button></div>`;
});
function openDonateUserSheet(username){
  if(!requireAuth()) return;
  openSheet(`<div class="sheet-handle"></div><h3>دعم ${escapeHtml(username)}</h3>
  <p class="muted center" style="font-size:12.5px;margin-bottom:14px">رصيدك الحالي: ${myPoints()} نقطة</p>
  <div class="input-wrap" style="margin-bottom:14px"><i class="ri-coin-line"></i><input id="donate-user-amt" type="number" placeholder="عدد النقاط" min="1"></div>
  <div class="row" style="gap:10px"><button class="btn outline" onclick="closeModal()">إلغاء</button>
  <button class="btn gold" onclick="submitDonateUser('${username}')">دعم</button></div>`);
}
async function submitDonateUser(username){
  const amt = parseInt(document.getElementById('donate-user-amt').value);
  if(!amt||amt<=0) return toast('أدخل عدداً صحيحاً');
  const {data,error} = await sb.rpc('donate_to_user', {p_to_username:username, p_amount:amt});
  if(error||!data?.ok){ toast(data?.msg||'تعذرت العملية'); return; }
  toast(data.msg); await refreshSession(); closeModal();
}
async function submitReply(postId){
  if(!requireAuth()) return;
  const input = document.getElementById('reply-input'); const content = input.value.trim();
  if(!content) return;
  const {error} = await sb.from('forum_replies').insert({post_id:postId,user_id:state.user.id,content});
  if(error) return toast('تعذر الرد');
  input.value=''; renderRoute();
}
